<!doctype html>
<html lang="vi" style="background-color: #f6f5f7;">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quản lý dịch vụ & phụ thu - Roomi Dev</title>
    <style>
      /* Ngăn nháy trắng */
      html {
        background: #f6f5f7;
      }
      body {
        opacity: 0 !important;
        transition: opacity 0.2s ease-in;
      }
      body.loaded {
        opacity: 1 !important;
      }
      /* Custom styles for service list */
      .status-badge {
        display: inline-block;
        padding: 5px 12px;
        border-radius: 20px;
        font-size: 12px;
        font-weight: 500;
        text-align: center;
      }
      .status-badge.active {
        background: #d4edda;
        color: #155724;
      }
      .status-badge.inactive {
        background: #f8d7da;
        color: #721c24;
      }
      .btn-deactivate,
      .btn-reactivate {
        padding: 6px 12px;
        border: none;
        border-radius: 6px;
        font-size: 13px;
        cursor: pointer;
        transition: all 0.2s;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        white-space: nowrap;
        font-family: "Montserrat", sans-serif;
      }
      .btn-deactivate {
        background: #ffc107;
        color: #212529;
      }
      .btn-deactivate:hover {
        background: #e0a800;
        color: #212529;
      }
      .btn-reactivate {
        background: #28a745;
        color: white;
      }
      .btn-reactivate:hover {
        background: #218838;
        color: white;
      }
      .filter-group {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .filter-group label {
        font-size: 14px;
        font-weight: 500;
        color: #6c757d;
      }
      .filter-group select {
        padding: 8px 12px;
        border: 1.5px solid #e0e0e0;
        border-radius: 8px;
        font-size: 13px;
        font-family: "Montserrat", sans-serif;
        background: white;
        cursor: pointer;
      }
    </style>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="../../css/page-transition.css" />
    <link rel="stylesheet" href="../../css/shared-styles.css" />
  </head>
  <body>
    <!-- Sidebar -->
    <div id="sidebar-container"></div>

    <!-- Main Content -->
    <div class="main-content">
      <div class="page-header">
        <div class="page-header-left">
          <h1><i class="fa fa-concierge-bell"></i> Quản lý dịch vụ & Phụ thu</h1>
          <p>Quản lý danh sách các dịch vụ tiện ích và đơn giá phụ thu của nhà trọ.</p>
        </div>
        <button class="btn-primary" id="openCreateModalBtn">
          <i class="fa fa-plus"></i> Thêm dịch vụ
        </button>
      </div>

      <div class="message-box" id="pageMessage"></div>

      <!-- Services Table -->
      <div class="table-wrapper">
        <div class="toolbar">
          <span class="total-label" id="totalLabel">0 dịch vụ</span>
          
          <div class="toolbar-right">
            <div class="filter-group">
              <label for="filterActive">Trạng thái:</label>
              <select id="filterActive">
                <option value="true">Chỉ dịch vụ đang chạy</option>
                <option value="false">Tất cả dịch vụ</option>
              </select>
            </div>
            <button class="btn-icon" id="refreshBtn" title="Tải lại">
              <i class="fa fa-sync-alt"></i>
            </button>
          </div>
        </div>

        <div class="table-container">
          <table class="rooms-table" id="servicesTable">
            <thead>
              <tr>
                <th style="width: 60px">#</th>
                <th>Tên dịch vụ</th>
                <th style="width: 150px">Đơn giá</th>
                <th>Mô tả</th>
                <th style="width: 150px">Trạng thái</th>
                <th style="width: 250px">Thao tác</th>
              </tr>
            </thead>
            <tbody id="servicesTableBody"></tbody>
          </table>
          <div class="table-empty" id="tableEmpty" style="display: none">
            <i class="fa fa-concierge-bell"></i>
            <p>Chưa có dịch vụ nào được định nghĩa.</p>
          </div>
          <div class="table-loading" id="tableLoading" style="display: none">
            <i class="fa fa-spinner fa-spin"></i> Đang tải dữ liệu...
          </div>
        </div>
      </div>
    </div>

    <!-- ═══ MODAL: Tạo / Chỉnh sửa dịch vụ ═══ -->
    <div class="modal-overlay" id="serviceModal">
      <div class="modal">
        <div class="modal-header">
          <h2 id="modalTitle"><i class="fa fa-plus"></i> Thêm dịch vụ mới</h2>
          <button class="modal-close" id="closeModalBtn">&times;</button>
        </div>
        <div class="modal-body">
          <div class="message-box" id="modalMessage"></div>

          <form id="serviceForm" onsubmit="return false;">
            <div class="form-grid" style="grid-template-columns: 1fr;">
              <div class="form-group">
                <label for="inputName">Tên dịch vụ <span class="required">*</span></label>
                <input
                  type="text"
                  id="inputName"
                  placeholder="Ví dụ: Tiền điện, Tiền nước, Giặt ủi..."
                  required
                  maxlength="100"
                />
              </div>

              <div class="form-group">
                <label for="inputUnitPrice">Đơn giá (VNĐ) <span class="required">*</span></label>
                <input
                  type="number"
                  id="inputUnitPrice"
                  placeholder="Ví dụ: 3500, 20000..."
                  required
                  min="0"
                />
              </div>

              <div class="form-group">
                <label for="inputDescription">Mô tả chi tiết</label>
                <textarea
                  id="inputDescription"
                  rows="3"
                  placeholder="Mô tả cách tính tiền hoặc chu kỳ thu (nếu có)..."
                  maxlength="255"
                ></textarea>
              </div>

              <div class="form-group" style="flex-direction: row; align-items: center; gap: 10px; margin-top: 10px;">
                <input type="checkbox" id="inputActive" checked style="width: auto; cursor: pointer;" />
                <label for="inputActive" style="cursor: pointer; margin-bottom: 0;">Đang hoạt động (cho phép ghi nhận sử dụng)</label>
              </div>
            </div>
          </form>
        </div>
        <div class="modal-footer">
          <button class="btn-outline" id="cancelModalBtn">Hủy</button>
          <button class="btn-primary" id="saveServiceBtn">
            <i class="fa fa-save"></i>
            <span id="saveServiceBtnText">Lưu dịch vụ</span>
          </button>
        </div>
      </div>
    </div>

    <!-- ═══ MODAL: Xác nhận xóa / Vô hiệu hóa ═══ -->
    <div class="modal-overlay" id="confirmModal">
      <div class="modal modal-sm">
        <div class="modal-header">
          <h2 id="confirmTitle">
            <i class="fa fa-exclamation-triangle"></i> Xác nhận
          </h2>
          <button class="modal-close" id="closeConfirmBtn">&times;</button>
        </div>
        <div class="modal-body">
          <p id="confirmMessage">
            Bạn có chắc chắn muốn thực hiện thao tác này?
          </p>
        </div>
        <div class="modal-footer">
          <button class="btn-outline" id="cancelConfirmBtn">Hủy</button>
          <button class="btn-danger" id="confirmActionBtn">
            Xác nhận
          </button>
        </div>
      </div>
    </div>

    <script src="../../js/constants/config.js"></script>
    <script src="../../js/utils/auth.js"></script>
    <script src="../../js/api/api.js"></script>
    <script src="../../components/sidebar/sidebar.js"></script>
    <script src="surcharge-services.js"></script>
  </body>
</html>
