<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Roomi Dev - Đổi mật khẩu tài khoản của bạn"
    />
    <title>Đổi Mật Khẩu - Roomi Dev</title>
    <style>
      /* Ngăn nháy trắng - phải đặt trước mọi CSS khác */
      html { background: #f6f5f7; }
      body { opacity: 0 !important; transition: opacity 0.2s ease-in; }
      body.loaded { opacity: 1 !important; }
    </style>
    <!-- FontAwesome Icons -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="change-password.css" />
  </head>
  <body>
    <div class="container">
      <div class="form-container">
        <form id="changePasswordForm" novalidate>
          <h1>Đổi Mật Khẩu</h1>
          <p class="subtitle">
            Vui lòng nhập mật khẩu mới của bạn
          </p>

          <div class="message-box" id="messageBox"></div>

          <div class="password-group">
            <input
              type="password"
              id="newPassword"
              placeholder="Mật khẩu mới (tối thiểu 6 ký tự)"
              required
              autocomplete="new-password"
            />
            <i
              class="toggle-password fa-regular fa-eye-slash"
              onclick="togglePasswordVisibility('newPassword', this)"
              title="Hiện/ẩn mật khẩu"
            ></i>
          </div>

          <div class="password-group">
            <input
              type="password"
              id="confirmPassword"
              placeholder="Xác nhận mật khẩu mới"
              required
              autocomplete="new-password"
            />
            <i
              class="toggle-password fa-regular fa-eye-slash"
              onclick="togglePasswordVisibility('confirmPassword', this)"
              title="Hiện/ẩn mật khẩu"
            ></i>
          </div>

          <button type="submit" id="changePasswordBtn">
            Cập nhật mật khẩu
          </button>
          <a
            href="../dashboard/dashboard.html"
            class="back-link"
            id="backToDashboard"
          >
            ← Quay lại Dashboard
          </a>
        </form>
      </div>
    </div>

    <!-- Shared modules (load trước) -->
    <script src="../../js/constants/config.js"></script>
    <script src="../../js/utils/auth.js"></script>
    <script src="../../js/api/api.js"></script>
    <!-- Page script (load sau) -->
    <script src="change-password.js"></script>
  </body>
</html>
