<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Roomi Dev - Hệ thống quản lý phòng trọ thông minh. Đăng nhập hoặc tạo tài khoản để bắt đầu."
    />
    <title>Roomi Dev - Đăng nhập & Đăng ký</title>
    <style>
      /* Ngăn nháy trắng - phải đặt trước mọi CSS khác */
      html { background: #f6f5f7; }
      body { opacity: 0 !important; transition: opacity 0.2s ease-in; }
      body.loaded { opacity: 1 !important; }
    </style>
    <!-- FontAwesome Icons -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="login.css" />
  </head>
  <body class="loaded">
    <div class="container" id="container">
      <!-- Form Đăng Ký -->
      <div class="form-container sign-up-container">
        <form id="registerForm" novalidate>
          <h1>Tạo tài khoản</h1>
          <div class="message-box" id="registerMessage"></div>

          <input
            type="text"
            id="regUsername"
            placeholder="Tên đăng nhập *"
            required
            autocomplete="username"
          />
          <input
            type="text"
            id="regFullName"
            placeholder="Họ và tên *"
            required
            autocomplete="name"
          />
          <input
            type="email"
            id="regEmail"
            placeholder="Email"
            autocomplete="email"
          />
          <input
            type="tel"
            id="regPhone"
            placeholder="Số điện thoại"
            autocomplete="tel"
          />

          <!-- Password Group -->
          <div class="password-group">
            <input
              type="password"
              id="regPassword"
              placeholder="Mật khẩu *"
              required
              autocomplete="new-password"
            />
            <i
              class="toggle-password fa-regular fa-eye-slash"
              onclick="togglePasswordVisibility('regPassword', this)"
              title="Hiện/ẩn mật khẩu"
            ></i>
          </div>

          <button type="submit" id="registerBtn">Đăng ký</button>
        </form>
      </div>

      <!-- Form Đăng Nhập -->
      <div class="form-container sign-in-container">
        <form id="loginForm" novalidate>
          <h1>Đăng nhập</h1>
          <div class="message-box" id="loginMessage"></div>

          <input
            type="text"
            id="loginUsername"
            placeholder="Tên đăng nhập"
            required
            autocomplete="username"
          />

          <!-- Password Group -->
          <div class="password-group">
            <input
              type="password"
              id="loginPassword"
              placeholder="Mật khẩu"
              required
              autocomplete="current-password"
            />
            <i
              class="toggle-password fa-regular fa-eye-slash"
              onclick="togglePasswordVisibility('loginPassword', this)"
              title="Hiện/ẩn mật khẩu"
            ></i>
          </div>

          <a href="#">Quên mật khẩu?</a>
          <button type="submit" id="loginBtn">Đăng nhập</button>
        </form>
      </div>

      <!-- Panel chuyển đổi giao diện -->
      <div class="overlay-container">
        <div class="overlay">
          <div class="overlay-panel overlay-left">
            <h1>Chào mừng trở lại!</h1>
            <p>
              Để giữ kết nối với chúng tôi, vui lòng đăng nhập bằng thông tin cá nhân của bạn
            </p>
            <button class="ghost" id="signInBtn">Đăng nhập</button>
          </div>
          <div class="overlay-panel overlay-right">
            <h1>Chào bạn!</h1>
            <p>
              Nhập thông tin cá nhân của bạn và bắt đầu hành trình cùng chúng tôi
            </p>
            <button class="ghost" id="signUpBtn">Đăng ký</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Shared modules (load trước) -->
    <script src="../../js/constants/config.js"></script>
    <script src="../../js/utils/auth.js"></script>
    <script src="../../js/api/api.js"></script>
    <!-- Page script (load sau) -->
    <script src="login.js"></script>
  </body>
</html>
