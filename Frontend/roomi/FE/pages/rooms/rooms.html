<!doctype html>
<html lang="vi" style="background-color: #f6f5f7;">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quản lý phòng - Roomi Dev</title>
    <style>
      /* Ngăn nháy trắng - phải đặt trước mọi CSS khác */
      html {
        background: #f6f5f7;
      }
      body {
        opacity: 0 !important;
        transition: opacity 0.2s ease-in;
      }
      body.loaded {
        opacity: 1 !important;
      }
    </style>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="../../css/page-transition.css" />
    <link rel="stylesheet" href="../../css/shared-styles.css" />
  </head>
  <body>
    <!-- Sidebar -->
    <div id="sidebar-container"></div>


    <!-- Main Content -->
    <div class="main-content">
      <div class="page-header">
        <div class="page-header-left">
          <h1><i class="fa fa-door-open"></i> Quản lý phòng</h1>
          <p>Thêm, sửa, xóa và theo dõi trạng thái các phòng.</p>
        </div>
        <button class="btn-primary" id="openCreateModalBtn">
          <i class="fa fa-plus"></i> Thêm phòng
        </button>
      </div>

      <!-- Toolbar -->
      <div class="toolbar">
        <div class="search-box">
          <i class="fa fa-search"></i>
          <input
            type="text"
            id="searchInput"
            placeholder="Tìm theo số phòng, tầng..."
          />
        </div>
        <div class="filter-group">
          <select id="filterRoomType">
            <option value="">Tất cả loại phòng</option>
          </select>
          <select id="filterStatus">
            <option value="">Tất cả trạng thái</option>
            <option value="AVAILABLE">Còn trống</option>
            <option value="OCCUPIED">Đang sử dụng</option>
            <option value="NEEDS_CLEANING">Cần dọn dẹp</option>
            <option value="MAINTENANCE">Bảo trì</option>
          </select>
        </div>
        <div class="toolbar-right">
          <span class="total-label" id="totalLabel">0 phòng</span>
          <button class="btn-icon" id="refreshBtn" title="Tải lại">
            <i class="fa fa-sync-alt"></i>
          </button>
        </div>
      </div>

      <div class="message-box" id="pageMessage"></div>

      <!-- Rooms Table -->
      <div class="table-wrapper">
        <div class="table-container">
          <table class="rooms-table" id="roomsTable">
            <thead>
              <tr>
                <th style="width: 44px">#</th>
                <th style="width: 120px">Số phòng</th>
                <th>Loại phòng</th>
                <th style="width: 100px">Tầng</th>
                <th style="width: 150px">Trạng thái</th>
                <th>Ghi chú</th>
                <th style="width: 120px">Thao tác</th>
              </tr>
            </thead>
            <tbody id="roomsTableBody"></tbody>
          </table>
          <div class="table-empty" id="tableEmpty" style="display: none">
            <i class="fa fa-door-closed"></i>
            <p>Không tìm thấy phòng nào.</p>
          </div>
          <div class="table-loading" id="tableLoading">
            <i class="fa fa-spinner fa-spin"></i> Đang tải dữ liệu...
          </div>
        </div>
      </div>
    </div>

    <!-- ═══ MODAL: Tạo / Chỉnh sửa phòng ═══ -->
    <div class="modal-overlay" id="roomModal">
      <div class="modal">
        <div class="modal-header">
          <h2 id="modalTitle"><i class="fa fa-plus"></i> Thêm phòng mới</h2>
          <button class="modal-close" id="closeModalBtn">&times;</button>
        </div>
        <div class="modal-body">
          <div class="message-box" id="modalMessage"></div>
          <div class="form-grid">
            <div class="form-group">
              <label for="inputRoomNumber"
                >Số phòng <span class="required">*</span></label
              >
              <input
                type="text"
                id="inputRoomNumber"
                placeholder="101"
                maxlength="20"
              />
            </div>
            <div class="form-group">
              <label for="inputRoomType"
                >Loại phòng <span class="required">*</span></label
              >
              <select id="inputRoomType">
                <option value="">-- Chọn loại phòng --</option>
              </select>
            </div>
            <div class="form-group">
              <label for="inputFloor">Tầng</label>
              <input
                type="text"
                id="inputFloor"
                placeholder="1"
                maxlength="10"
              />
            </div>
            <div class="form-group">
              <label for="inputStatus">Trạng thái</label>
              <select id="inputStatus">
                <option value="AVAILABLE">Còn trống</option>
                <option value="OCCUPIED">Đang sử dụng</option>
                <option value="NEEDS_CLEANING">Cần dọn dẹp</option>
                <option value="MAINTENANCE">Bảo trì</option>
              </select>
            </div>
            <div class="form-group form-group-full">
              <label for="inputNote">Ghi chú</label>
              <textarea
                id="inputNote"
                rows="3"
                placeholder="Ghi chú về phòng..."
              ></textarea>
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn-outline" id="cancelModalBtn">Hủy</button>
          <button class="btn-primary" id="saveRoomBtn">
            <i class="fa fa-save"></i>
            <span id="saveRoomBtnText">Thêm phòng</span>
          </button>
        </div>
      </div>
    </div>

    <!-- ═══ MODAL: Xác nhận xóa ═══ -->
    <div class="modal-overlay" id="confirmModal">
      <div class="modal modal-sm">
        <div class="modal-header">
          <h2 id="confirmTitle">
            <i class="fa fa-exclamation-triangle"></i> Xác nhận xóa
          </h2>
          <button class="modal-close" id="closeConfirmBtn">&times;</button>
        </div>
        <div class="modal-body">
          <p id="confirmMessage">Bạn có chắc chắn muốn xóa phòng này?</p>
        </div>
        <div class="modal-footer">
          <button class="btn-outline" id="cancelConfirmBtn">Hủy</button>
          <button class="btn-danger" id="confirmActionBtn">
            <i class="fa fa-trash"></i> Xóa
          </button>
        </div>
      </div>
    </div>

    <script src="../../js/constants/config.js"></script>
    <script src="../../js/utils/auth.js"></script>
    <script src="../../js/api/api.js"></script>
    <script src="../../components/sidebar/sidebar.js"></script>
    <script src="rooms.js"></script>
  </body>
</html>
