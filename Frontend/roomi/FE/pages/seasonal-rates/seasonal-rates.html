<!doctype html>
<html lang="vi" style="background-color: #f6f5f7;">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quản lý giá theo mùa - Roomi Dev</title>
    <style>
      /* Ngăn nháy trắng - phải đặt trước mọi CSS khác */
      html {
        background: #f6f5f7;
      }
      body {
        opacity: 0 !important;
        transition: opacity 0.2s ease-in;
      }
      body.loaded {
        opacity: 1 !important;
      }
    </style>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="../../css/page-transition.css" />
    <link rel="stylesheet" href="../../css/shared-styles.css" />
    <link rel="stylesheet" href="seasonal-rates-custom.css" />
  </head>
  <body>
    <!-- Sidebar -->
    <div id="sidebar-container"></div>


    <!-- Main Content -->
    <div class="main-content">
      <div class="page-header">
        <div class="page-header-left">
          <h1><i class="fa fa-calendar-alt"></i> Quản lý giá theo mùa</h1>
          <p>Cấu hình giá phòng theo từng khoảng thời gian trong năm.</p>
        </div>
        <button class="btn-primary" id="openCreateModalBtn">
          <i class="fa fa-plus"></i> Thêm giá mùa
        </button>
      </div>

      <!-- Filter Bar -->
      <div class="filter-bar">
        <div class="filter-group">
          <label for="roomTypeFilter"
            ><i class="fa fa-filter"></i> Lọc theo loại phòng:</label
          >
          <select id="roomTypeFilter">
            <option value="">Tất cả loại phòng</option>
          </select>
        </div>
      </div>

      <!-- Toolbar -->
      <div class="toolbar">
        <div class="search-box">
          <i class="fa fa-search"></i>
          <input
            type="text"
            id="searchInput"
            placeholder="Tìm theo tên loại phòng..."
          />
        </div>
        <div class="toolbar-right">
          <span class="total-label" id="totalLabel">0 giá theo mùa</span>
          <button class="btn-icon" id="refreshBtn" title="Tải lại">
            <i class="fa fa-sync-alt"></i>
          </button>
        </div>
      </div>

      <div class="message-box" id="pageMessage"></div>

      <!-- Seasonal Rates Table -->
      <div class="table-wrapper">
        <div class="table-container">
          <table class="rooms-table" id="seasonalRatesTable">
            <thead>
              <tr>
                <th style="width: 44px">#</th>
                <th>Loại phòng</th>
                <th style="width: 250px">Thời gian áp dụng</th>
                <th style="width: 150px">Giá (VNĐ)</th>
                <th id="actionColumnHeader" style="width: 150px">Thao tác</th>
              </tr>
            </thead>
            <tbody id="seasonalRatesTableBody"></tbody>
          </table>
          <div class="table-empty" id="tableEmpty" style="display: none">
            <i class="fa fa-calendar-alt"></i>
            <p>Không tìm thấy giá theo mùa nào.</p>
          </div>
          <div class="table-loading" id="tableLoading">
            <i class="fa fa-spinner fa-spin"></i> Đang tải dữ liệu...
          </div>
        </div>
      </div>
    </div>

    <!-- ═══ MODAL: Tạo / Chỉnh sửa giá theo mùa ═══ -->
    <div class="modal-overlay" id="seasonalRateModal">
      <div class="modal">
        <div class="modal-header">
          <h2 id="modalTitle"><i class="fa fa-plus"></i> Thêm giá theo mùa</h2>
          <button class="modal-close" id="closeModalBtn">&times;</button>
        </div>
        <div class="modal-body">
          <div class="message-box" id="modalMessage"></div>
          <div class="form-grid">
            <div class="form-group form-group-full">
              <label for="inputRoomType"
                >Loại phòng <span class="required">*</span></label
              >
              <select id="inputRoomType">
                <option value="">-- Chọn loại phòng --</option>
              </select>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label for="inputStartDate"
                  >Ngày bắt đầu <span class="required">*</span></label
                >
                <div class="date-input-wrapper">
                  <input type="date" id="inputStartDate" />
                </div>
              </div>
              <div class="form-group">
                <label for="inputEndDate"
                  >Ngày kết thúc <span class="required">*</span></label
                >
                <div class="date-input-wrapper">
                  <input type="date" id="inputEndDate" />
                </div>
              </div>
            </div>
            <div class="form-group form-group-full">
              <label for="inputPrice"
                >Giá (VNĐ) <span class="required">*</span></label
              >
              <input
                type="number"
                id="inputPrice"
                placeholder="500000"
                min="0"
                step="10000"
              />
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn-outline" id="cancelModalBtn">Hủy</button>
          <button class="btn-primary" id="saveSeasonalRateBtn">
            <i class="fa fa-save"></i>
            <span id="saveSeasonalRateBtnText">Lưu</span>
          </button>
        </div>
      </div>
    </div>

    <!-- ═══ MODAL: Xác nhận xóa ═══ -->
    <div class="modal-overlay" id="confirmModal">
      <div class="modal modal-sm">
        <div class="modal-header">
          <h2 id="confirmTitle">
            <i class="fa fa-exclamation-triangle"></i> Xác nhận xóa
          </h2>
          <button class="modal-close" id="closeConfirmBtn">&times;</button>
        </div>
        <div class="modal-body">
          <p id="confirmMessage">Bạn có chắc chắn muốn xóa giá theo mùa này?</p>
        </div>
        <div class="modal-footer">
          <button class="btn-outline" id="cancelConfirmBtn">Hủy</button>
          <button class="btn-danger" id="confirmActionBtn">
            <i class="fa fa-trash"></i> Xóa
          </button>
        </div>
      </div>
    </div>

    <script src="../../js/constants/config.js"></script>
    <script src="../../js/utils/auth.js"></script>
    <script src="../../js/api/api.js"></script>
    <script src="../../components/sidebar/sidebar.js"></script>
    <script src="seasonal-rates.js"></script>
  </body>
</html>
