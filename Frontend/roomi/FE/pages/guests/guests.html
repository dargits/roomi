<!doctype html>
<html lang="vi" style="background-color: #f6f5f7;">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Roomi Dev - Quản lý khách hàng" />
    <title>Quản lý khách hàng - Roomi Dev</title>
    <style>
      /* Ngăn nháy trắng - đồng bộ trang chủ */
      html {
        background: #f6f5f7;
      }
      body {
        opacity: 0 !important;
        transition: opacity 0.2s ease-in;
      }
      body.loaded {
        opacity: 1 !important;
      }
    </style>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="../../css/page-transition.css" />
    <link rel="stylesheet" href="../dashboard/dashboard.css" />
    <link rel="stylesheet" href="guests.css" />
  </head>
  <body>
    <!-- Sidebar -->
    <div id="sidebar-container"></div>
    <!-- Nội dung chính -->
    <div class="main-content">
      <header class="dashboard-header">
        <div class="header-left">
          <h1>Quản lý khách hàng</h1>
          <p>Danh sách thông tin lưu trữ và tra cứu khách hàng nhanh chóng.</p>
        </div>
        <div class="header-right">
          <div class="header-date" id="headerDate"></div>
        </div>
      </header>

      <!-- Thanh công cụ tìm kiếm và Thêm mới -->
      <div class="toolbar-card">
        <div class="search-box-group">
          <!-- Tìm theo tên -->
          <div class="search-input-wrapper">
            <i class="fa fa-search search-icon"></i>
            <input
              type="text"
              id="searchNameInput"
              placeholder="Tìm theo tên khách hàng..."
            />
          </div>
          <!-- Check nhanh theo SĐT dành cho lễ tân -->
          <div class="search-input-wrapper">
            <i class="fa fa-phone search-icon"></i>
            <input
              type="text"
              id="searchPhoneInput"
              placeholder="Check nhanh SĐT walk-in..."
            />
            <button class="btn-quick-search" id="btnQuickPhoneSearch">
              Tìm
            </button>
          </div>
        </div>
        <button class="card-btn card-btn-primary" id="btnOpenCreateModal">
          <i class="fa fa-user-plus"></i> Thêm khách hàng
        </button>
      </div>

      <!-- Bảng danh sách khách hàng -->
      <div class="table-card">
        <table class="data-table">
          <thead>
            <tr>
              <th style="width: 60px;">STT</th>
              <th>Họ và tên</th>
              <th>Số điện thoại</th>
              <th>Số CCCD/CMND</th>
              <th>Email</th>
              <th>Điểm tích lũy</th>
              <th>Ghi chú</th>
              <th style="width: 110px;">Thao tác</th>
            </tr>
          </thead>
          <tbody id="guestTableBody">
            <tr>
              <td colspan="8" class="text-center">Đang tải dữ liệu...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- Toast Notification Container -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- Modal Thêm/Sửa Khách hàng -->
    <div class="modal-overlay" id="guestModal">
      <div class="modal-container">
        <div class="modal-header">
          <h3 id="modalTitle">Thêm mới khách hàng</h3>
          <button class="modal-close" id="btnCloseModal">&times;</button>
        </div>
        <form id="guestForm">
          <input type="hidden" id="guestId" />
          <div class="form-group">
            <label for="fullName"
              >Họ và tên <span class="required">*</span></label
            >
            <input
              type="text"
              id="fullName"
              required
              placeholder="Nhập họ và tên..."
            />
          </div>
          <div class="form-group">
            <label for="phone">Số điện thoại</label>
            <input type="text" id="phone" placeholder="Nhập số điện thoại..." />
          </div>
          <div class="form-group">
            <label for="idNumber">Số CCCD / CMND</label>
            <input
              type="text"
              id="idNumber"
              placeholder="Nhập số căn cước công dân..."
            />
          </div>
          <div class="form-group">
            <label for="email">Email</label>
            <input
              type="email"
              id="email"
              placeholder="Nhập địa chỉ email..."
            />
          </div>
          <div class="form-group">
            <label for="note">Ghi chú</label>
            <textarea
              id="note"
              rows="3"
              placeholder="Nhập ghi chú thêm..."
            ></textarea>
          </div>
          <div class="modal-actions">
            <button
              type="button"
              class="card-btn card-btn-outline"
              id="btnCancelModal"
            >
              Hủy
            </button>
            <button type="submit" class="card-btn card-btn-primary">
              Lưu thông tin
            </button>
          </div>
        </form>
      </div>
    </div>

    <!-- Modal Xác nhận xóa -->
    <div class="modal-overlay" id="confirmModal">
      <div class="modal-container modal-sm">
        <div class="modal-header">
          <h3><i class="fa fa-exclamation-triangle" style="color: #e53935;"></i> Xác nhận xóa</h3>
          <button class="modal-close" id="btnCloseConfirmModal">&times;</button>
        </div>
        <p style="margin-bottom: 24px; color: #555; font-size: 14px;" id="confirmDeleteText">
          Bạn có chắc chắn muốn xóa khách hàng này không?
        </p>
        <div class="modal-actions">
          <button class="card-btn card-btn-outline" id="btnCancelConfirmModal">Hủy</button>
          <button class="card-btn card-btn-danger" id="btnDoDelete">Xóa ngay</button>
        </div>
      </div>
    </div>

    <script src="../../js/constants/config.js"></script>
    <script src="../../js/utils/auth.js"></script>
    <script src="../../js/api/api.js"></script>
    <script src="../../components/sidebar/sidebar.js"></script>
    <script src="guests.js"></script>
  </body>
</html>
